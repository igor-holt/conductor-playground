apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: genesis-operator-web
spec:
  template:
    spec:
      containers:
        - image: us-central1-docker.pkg.dev/${PROJECT_ID}/genesis/genesis-operator-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: GENESIS_API_BASE_URL
              value: "${GENESIS_API_BASE_URL}"
